<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question Migration</title>
</head>
<body>

<h2>Migrating Questions...</h2>
<p id="status">Starting...</p>

<script type="module">

import {
  db,
  collection,
  getDocs,
  updateDoc,
  doc,
  setDoc,
  increment,
  serverTimestamp
} from "./firebase-config.js";

// CREATE MIXED TOPIC
async function ensureMixedTopicExists() {

  await setDoc(
    doc(db, "quizTopics", "mixed-topics"),
    {
      name: "Mixed Topics",
      slug: "mixed-topics",
      createdAt: serverTimestamp()
    },
    { merge: true }
  );

}

// UPDATE QUESTIONS
async function migrateQuestions() {

  const status = document.getElementById("status");

  try {

    status.textContent =
      "Creating Mixed Topics...";

    await ensureMixedTopicExists();

    status.textContent =
      "Loading questions...";

    const snapshot =
      await getDocs(collection(db, "questions"));

    let updated = 0;

    let counts = {
      beginner: 0,
      intermediate: 0,
      advanced: 0
    };

    for (const questionDoc of snapshot.docs) {

      const data = questionDoc.data();

      // ONLY UPDATE OLD QUESTIONS
      if (!data.topic) {

        await updateDoc(
          doc(db, "questions", questionDoc.id),
          {
            topic: "mixed-topics",
            topicName: "Mixed Topics"
          }
        );

        updated++;

        if (data.level) {

          counts[data.level] =
            (counts[data.level] || 0) + 1;

        }

      }

    }

    // CREATE COUNTS
    await setDoc(
      doc(db, "quizMetadata", "counts"),
      {
        "mixed-topics": counts
      },
      { merge: true }
    );

    status.innerHTML = `
      ✅ Migration Complete<br><br>

      Updated Questions: ${updated}<br><br>

      Beginner: ${counts.beginner}<br>
      Intermediate: ${counts.intermediate}<br>
      Advanced: ${counts.advanced}
    `;

  } catch (err) {

    console.error(err);

    status.innerHTML =
      "❌ Migration failed. Check console.";

  }

}

migrateQuestions();

</script>

</body>
</html>
